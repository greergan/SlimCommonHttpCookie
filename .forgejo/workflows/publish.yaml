name: build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 1.0.1)'
        required: false

jobs:
  build-and-publish:
    runs-on: self-hosted
    container:
      image: slim-toolchain
      options: --privileged

    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Checkout SlimLibraryPackager
        uses: actions/checkout@v4
        with:
          repository: greergan/SlimLibraryPackager
          path: SlimLibraryPackager
          ref: master

      - name: Determine Version
        run: |
          if [[ -n "${{ github.event.inputs.version }}" ]]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV
          else
            # Strips 'v' from the tag name
            echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV
          fi

      - name: Update env
        run: |
          chmod +x ./SlimLibraryPackager/update_env.sh
          ./SlimLibraryPackager/update_env.sh

      - name: Build
        run: |
          make RELEASE_TYPE=Release SHARED_ONLY=OFF

      - name: Publish to Forgejo Registry
        env:
          # Using non-reserved secret names
          BASE_URL: "${{ secrets.REGISTRY_URL }}/api/packages/${{ github.repository_owner }}\
            /generic/${{ github.event.repository.name }}/${{ env.VERSION }}"
        run: |
          # Iterate through all .deb and .rpm files in the dist/ directory
          for file in dist/*.deb dist/*.rpm; do
            if [ -f "$file" ]; then
              FILENAME=$(basename "$file")
              echo "Publishing $FILENAME to the registry..."
              
              curl --user ${{ secrets.REGISTRY_USER }}:${{ secrets.REGISTRY_TOKEN }} \
                   --upload-file "$file" \
                   "$BASE_URL/$FILENAME"
            else
              echo "No artifacts found in dist/ to publish."
            fi
          done