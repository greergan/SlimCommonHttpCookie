- name: Publish to Forgejo Registry
        run: |
          REG_URL="${{ secrets.REGISTRY_URL }}"
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"

          shopt -s nullglob
          files=(dist/*.deb dist/*.rpm)
          
          for file in "${files[@]}"; do
            FILENAME=$(basename "$file")
            
            # Extract version from filename (e.g., slimcommonhttpcookie-v0.9.0-amd64.deb -> 0.9.0)
            # This regex looks for 'v' followed by digits and dots
            FILE_VERSION=$(echo "$FILENAME" | grep -oP 'v\K[0-9]+\.[0-9]+\.[0-9]+')
            
            # Fallback to the env variable if the regex finds nothing
            VERSION_TO_USE=${FILE_VERSION:-$VERSION}
            
            echo "Publishing $FILENAME as version $VERSION_TO_USE..."
            
            BASE_URL="$REG_URL/api/packages/$OWNER/generic/$REPO/$VERSION_TO_USE"
            
            curl --fail -sS \
                 --user "${{ secrets.REGISTRY_USER }}:${{ secrets.REGISTRY_TOKEN }}" \
                 --upload-file "$file" \
                 "$BASE_URL/$FILENAME" \
                 || { echo "Failed to publish $FILENAME"; exit 1; }
          done