name: build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 1.0.1)'
        required: false

jobs:
  build-and-publish:
    runs-on: self-hosted
    container:
      image: slim-toolchain
      options: --privileged

    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Checkout SlimLibraryPackager
        uses: actions/checkout@v4
        with:
          repository: greergan/SlimLibraryPackager
          path: SlimLibraryPackager
          ref: master

      - name: Validate configuration
        run: |
          # Validate Variables
          if [ -z "${{ vars.GIT_URL }}" ]; then 
            echo "Error: vars.GIT_URL is not set in Forgejo UI."
            exit 1
          fi
          
          # Validate Secrets
          if [ -z "${{ secrets.REGISTRY_USER }}" ]; then 
            echo "Error: secrets.REGISTRY_USER is not set in Forgejo UI."
            exit 1
          fi
          if [ -z "${{ secrets.REGISTRY_TOKEN }}" ]; then 
            echo "Error: secrets.REGISTRY_TOKEN is not set in Forgejo UI."
            exit 1
          fi

      - name: Determine Version
        run: |
          if [[ -n "${{ github.event.inputs.version }}" ]]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV
          elif [[ "$GITHUB_REF_NAME" == v* ]]; then
            echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV
          else
            echo "VERSION=0.0.0" >> $GITHUB_ENV
          fi

      - name: Update env
        run: |
          chmod +x ./SlimLibraryPackager/update_env.sh
          ./SlimLibraryPackager/update_env.sh

      - name: Build Packages
        run: |
          make packages GIT_URL="${{ vars.GIT_URL }}/${{ vars.REPO_OWNER }}""

      - name: Publish to Forgejo Registry
        run: |
          REG_URL="${{ vars.GIT_URL }}"
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"

          shopt -s nullglob
          files=(dist/*.deb dist/*.rpm)
          
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "No packages found in dist/" && exit 1
          fi

          for file in "${files[@]}"; do
            FILENAME=$(basename "$file")
            
            # Extract version using sed
            FILE_VERSION=$(echo "$FILENAME" | sed -n 's/.*v\([0-9]*\.[0-9]*\.[0-9]*\).*/\1/p')
            
            # Fallback to the env VERSION if regex doesn't match
            VERSION_TO_USE=${FILE_VERSION:-$VERSION}
            
            echo "Publishing $FILENAME as version $VERSION_TO_USE..."
            
            BASE_URL="$REG_URL/api/packages/$OWNER/generic/$REPO/$VERSION_TO_USE"
            echo "Target URL: $BASE_URL/$FILENAME"
            curl --fail -sS \
                 --user "${{ secrets.REGISTRY_USER }}:${{ secrets.REGISTRY_TOKEN }}" \
                 --upload-file "$file" \
                 "$BASE_URL/$FILENAME" \
                 || { echo "Failed to publish $FILENAME"; exit 1; }
          done